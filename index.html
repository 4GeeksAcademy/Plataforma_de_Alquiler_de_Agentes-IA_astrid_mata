<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentHub Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-white">

    <div class="flex min-h-screen">
        <nav class="w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 p-6 flex flex-col">
            <h1 class="text-2xl font-bold mb-10">AgentHub</h1>
            <ul class="space-y-4 flex-grow">
                <li><button onclick="showSection('dashboard')"
                        class="w-full text-left hover:text-blue-500">Dashboard</button></li>
                <li><button onclick="showSection('usuarios')" class="w-full text-left hover:text-blue-500">Gestión de
                        usuarios</button></li>
                <li><button onclick="showSection('agentes')" class="w-full text-left hover:text-blue-500">Gestión de
                        agentes</button></li>
            </ul>
            <button id="theme-toggle" class="p-2 bg-gray-200 dark:bg-gray-700 rounded">Toggle Modo Oscuro</button>
        </nav>

        <main class="flex-1 p-8">
            <section id="dashboard" class="section">
                <h2 class="text-2xl font-bold">Dashboard</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">

                    <div
                        class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700">
                        <div class="flex items-center justify-between mb-4">
                            <span class="text-gray-500 dark:text-gray-400">Ingresos Totales</span>
                            <div class="bg-blue-100 dark:bg-blue-900 p-2 rounded-lg text-blue-600 dark:text-blue-300">
                                <span>$</span>
                            </div>
                        </div>
                        <h3 class="text-3xl font-bold text-gray-900 dark:text-white">$12.5k</h3>
                    </div>

                    <div
                        class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700">
                        <div class="flex items-center justify-between mb-4">
                            <span class="text-gray-500 dark:text-gray-400">Pérdidas (Descuentos)</span>
                            <div class="bg-red-100 dark:bg-red-900 p-2 rounded-lg text-red-600 dark:text-red-300">
                                <span>%</span>
                            </div>
                        </div>
                        <h3 class="text-3xl font-bold text-gray-900 dark:text-white">$842</h3>
                    </div>

                    <div
                        class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700">
                        <div class="flex items-center justify-between mb-4">
                            <span class="text-gray-500 dark:text-gray-400">Agentes Activos</span>
                            <div
                                class="bg-green-100 dark:bg-green-900 p-2 rounded-lg text-green-600 dark:text-green-300">
                                <span>A</span>
                            </div>
                        </div>
                        <h3 class="text-3xl font-bold text-gray-900 dark:text-white">45</h3>
                    </div>

                    <div
                        class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700">
                        <div class="flex items-center justify-between mb-4">
                            <span class="text-gray-500 dark:text-gray-400">Agentes Fallando</span>
                            <div
                                class="bg-yellow-100 dark:bg-yellow-900 p-2 rounded-lg text-yellow-600 dark:text-yellow-300">
                                <span>!</span>
                            </div>
                        </div>
                        <h3 class="text-3xl font-bold text-gray-900 dark:text-white">12</h3>
                    </div>

                </div>

                <div
                    class="mt-8 p-8 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl flex items-center justify-center text-gray-500">
                    Gráfico de Actividad Semanal
                </div>
            </section>
            <section id="usuarios" class="section hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">Gestión de Usuarios</h2>
                    <button onclick="toggleModal('modal-añadir')"
                        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm">
                        + Añadir Usuario
                    </button>
                </div>

                <div
                    class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-x-auto">
                    <table class="w-full min-w-[600px] text-left">
                        <thead class="bg-gray-50 dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700">
                            <tr>
                                <th class="px-6 py-4 font-semibold text-gray-700 dark:text-gray-300">Nombre</th>
                                <th class="px-6 py-4 font-semibold text-gray-700 dark:text-gray-300">Email</th>
                                <th class="px-6 py-4 font-semibold text-gray-700 dark:text-gray-300">Plan</th>
                                <th class="px-6 py-4 font-semibold text-gray-700 dark:text-gray-300">Estado</th>
                                <th class="px-6 py-4 font-semibold text-gray-700 dark:text-gray-300">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="user-table-body" class="divide-y divide-gray-200 dark:divide-gray-700">
                            <tr>
                                <td class="px-6 py-4">Juan Pérez</td>
                                <td class="px-6 py-4 text-gray-500">juan@ejemplo.com</td>
                                <td class="px-6 py-4">Pro</td>
                                <td class="px-6 py-4">
                                    <span
                                        class="px-2 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800">Activo</span>
                                </td>
                                <td class="px-6 py-4 relative">
                                    <button onclick="toggleDropdown(this)"
                                        class="text-gray-500 hover:text-gray-700 dark:hover:text-white font-bold">⋮</button>

                                    <div
                                        class="dropdown-menu hidden absolute right-0 mt-2 w-40 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-xl z-10">
                                        <button
                                            class="block w-full text-left px-4 py-2 text-sm hover:bg-gray-100 dark:hover:bg-gray-700"
                                            onclick="alert('Ver detalle')">Ver detalle</button>
                                        <button
                                            class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20"
                                            onclick="alert('Eliminar')">Eliminar</button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>


            </section>
            <section id="agentes" class="section hidden">
                <h2 class="text-2xl font-bold">Gestión de Agentes</h2>
            </section>
        </main>
    </div>

    <div id="modal-añadir" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-lg w-96">
            <h3 class="text-xl font-bold mb-4">Añadir Nuevo Usuario</h3>
            <input type="text" placeholder="Nombre" class="w-full mb-3 p-2 border rounded dark:bg-gray-700">
            <input type="email" placeholder="Email" class="w-full mb-4 p-2 border rounded dark:bg-gray-700">
            <div class="flex justify-end gap-2">
                <button onclick="toggleModal('modal-añadir')" class="px-4 py-2 bg-gray-300 rounded">Cancelar</button>
                <button class="px-4 py-2 bg-blue-600 text-white rounded">Guardar</button>
            </div>
        </div>
    </div>


    <script>
        // Lógica de navegación
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // Lógica Modo Oscuro
        const toggleBtn = document.getElementById('theme-toggle');
        const html = document.documentElement;

        // Cargar preferencia guardada
        if (localStorage.theme === 'dark') html.classList.add('dark');

        toggleBtn.addEventListener('click', () => {
            html.classList.toggle('dark');
            localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
        });

        // Función para togglear el dropdown
        function toggleDropdown(button) {
            // Cierra todos los otros dropdowns abiertos
            document.querySelectorAll('.dropdown-menu').forEach(menu => {
                if (menu !== button.nextElementSibling) menu.classList.add('hidden');
            });

            // Togglea el actual
            button.nextElementSibling.classList.toggle('hidden');
        }

        // Cierra dropdowns al hacer clic fuera
        window.addEventListener('click', (e) => {
            if (!e.target.matches('button') && !e.target.closest('.dropdown-menu')) {
                document.querySelectorAll('.dropdown-menu').forEach(menu => menu.classList.add('hidden'));
            }
        });

        // Función genérica para abrir/cerrar cualquier modal
        function toggleModal(id) {
            const modal = document.getElementById(id);
            modal.classList.toggle('hidden');
        }

        // Opcional: Cerrar modal haciendo clic en el fondo (backdrop)
        document.getElementById('modal-añadir').addEventListener('click', (e) => {
            if (e.target.id === 'modal-añadir') {
                toggleModal('modal-añadir');
            }
        });
    </script>




</body>

</html>
